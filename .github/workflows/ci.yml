name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install

      - name: Type check
        run: pnpm --filter app check

      - name: Unit tests with coverage
        run: pnpm --filter app test:coverage

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: packages/app/coverage/lcov.info
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage for SonarQube
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: packages/app/coverage/lcov.info

  rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check -p jot-deck-core

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Tests with coverage
        run: cargo llvm-cov -p jot-deck-core --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          flags: rust
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage for SonarQube
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rust-coverage
          path: lcov.info

  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [frontend, rust]
    if: always()
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download frontend coverage
        uses: actions/download-artifact@v8
        with:
          name: frontend-coverage
          path: coverage/frontend
        continue-on-error: true

      - name: Download Rust coverage
        uses: actions/download-artifact@v8
        with:
          name: rust-coverage
          path: coverage/rust
        continue-on-error: true

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
